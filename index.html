<!DOCTYPE html>
<html>
<head>
  <title>Early Warning System</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">

    <h1>Infrastructure Early Warning System</h1>

    <div class="grid">

      <div class="card big">
        <h2>Risk Score</h2>
        <div id="risk" class="value">--</div>
      </div>

      <div class="card">
        <h3>Status</h3>
        <div id="status">--</div>
      </div>

      <div class="card">
        <h3>Root Cause</h3>
        <div id="root">--</div>
      </div>

      <div class="card">
        <h3>Time to Failure</h3>
        <div id="eta">--</div>
      </div>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
